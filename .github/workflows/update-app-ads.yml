name: Update app-ads.txt

on:
  schedule:
    # 06:00 Africa/Johannesburg is 04:00 UTC.
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and check without FTP upload"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      today:
        description: "Optional test date, format YYYY-MM-DD"
        required: false
        type: string
      test_telegram:
        description: "Send only the Telegram test message"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Update files
        env:
          APP_TIMEZONE: Africa/Johannesburg
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          TEST_TODAY: ${{ github.event.inputs.today }}
          TEST_TELEGRAM: ${{ github.event.inputs.test_telegram }}
        run: |
          if [ "$TEST_TELEGRAM" = "true" ]; then
            python app_ads_updater.py --test-telegram
            exit 0
          fi
          args=()
          if [ "$DRY_RUN" = "true" ]; then
            args+=(--dry-run)
          fi
          if [ -n "$TEST_TODAY" ]; then
            args+=(--today "$TEST_TODAY")
          fi
          python app_ads_updater.py "${args[@]}"

      - name: Upload log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-ads-updater-log
          path: logs/app-ads-updater.log
          if-no-files-found: ignore
